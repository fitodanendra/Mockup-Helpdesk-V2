<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Helpdesk v2.0 — Admin Console</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; }
  #hd-admin-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; }
</style>
</head>
<body>
<!-- console.html is the standalone Admin build maintained by the team.
     It already embeds the visual-unification CSS and the profile-popup
     chrome (they self-inject via timers that survive the bundle's
     documentElement swap), so the wrapper only needs to host it and add
     the shared Switch Role widget — no extra injection here, or the
     stylesheet/chrome would be applied twice. -->
<iframe id="hd-admin-frame" src="console.html" title="Admin Console"></iframe>
<script src="../shared/nav-widget.js" defer></script>
<script>
  // Remove the Dashboard subtitle "Ringkasan konfigurasi dan operasional
  // Enterprise Helpdesk 2.0". The Admin content lives inside console.html
  // as a gzip+base64 compiled module (with SRI integrity hashes), so it
  // can't be edited by hand — instead we delete the node here, in the
  // wrapper. A MutationObserver re-applies it because the admin is a
  // React SPA: navigating away from and back to the Dashboard re-creates
  // the element. Matching the exact text keeps it Dashboard-specific
  // (other screens have different subtitles).
  (function () {
    var TARGET = 'Ringkasan konfigurasi dan operasional Enterprise Helpdesk 2.0';
    var frame = document.getElementById('hd-admin-frame');

    function sweep(doc) {
      var nodes = doc.querySelectorAll('span, p');
      for (var i = 0; i < nodes.length; i++) {
        if (nodes[i].children.length === 0 &&
            nodes[i].textContent.trim() === TARGET) {
          nodes[i].remove();
        }
      }
    }

    frame.addEventListener('load', function () {
      var doc;
      try { doc = frame.contentDocument; } catch (e) { return; }
      if (!doc) return;
      sweep(doc);
      // The bundle swaps documentElement while unpacking and re-renders
      // on navigation; observe so the subtitle stays removed.
      var obs = new MutationObserver(function () { sweep(frame.contentDocument); });
      obs.observe(doc.documentElement, { childList: true, subtree: true });
    });
  })();
</script>
</body>
</html>
