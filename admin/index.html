<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Helpdesk v2.0 — Admin Console</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; }
  #hd-admin-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; }
</style>
</head>
<body>
<!-- console.html is the standalone Admin build maintained by the team.
     It already embeds the visual-unification CSS and the profile-popup
     chrome (they self-inject via timers that survive the bundle's
     documentElement swap), so the wrapper only needs to host it and add
     the shared Switch Role widget — no extra injection here, or the
     stylesheet/chrome would be applied twice. -->
<iframe id="hd-admin-frame" src="console.html" title="Admin Console"></iframe>
<script src="../shared/nav-widget.js" defer></script>
</body>
</html>
